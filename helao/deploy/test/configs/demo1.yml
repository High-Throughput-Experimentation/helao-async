dummy: true
simulation: true
experiment_libraries:
  - OERSIM_exp
  - helao\deploy\test\experiments\TEST_exp.py
sequence_libraries:
  - OERSIM_seq
  - helao\deploy\test\sequences\TEST_seq.py
run_type: simulation
root: C:/INST_hlo
servers:
  ORCH:
    host: 127.0.0.1
    port: 8011
    group: orchestrator
    fast: async_orch2
    params:
      enable_op: true
      bokeh_port: 5011
      launch_browser: true
  CPSIM:
    host: 127.0.0.1
    port: 8012
    group: action
    fast: cpsim_server
    params:
      plate_id: 3851
  ACTVIS:
    host: 127.0.0.1
    port: 5012
    group: visualizer
    bokeh: actionsim_visualizer
    params:
      doc_name: 'demo1: OER Simulation Visualizer'
      launch_browser: true
  GPSIM:
    host: 127.0.0.1
    port: 8003
    group: action